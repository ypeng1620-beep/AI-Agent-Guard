name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 9 * * *'  # 每日9点运行性能测试

jobs:
  test:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          cd integrator
          npm install
          cd ../subprojects/01-eval-engine
          npm install
          
      - name: Run unit tests
        run: node tests/unit.test.js
        
      - name: Run security tests
        run: node tests/security.test.js
        
      - name: Run integration tests
        run: node tests/full-integration.test.js
        
  performance:
    runs-on: windows-latest
    needs: test
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          cd integrator
          npm install
          cd ../subprojects/01-eval-engine
          npm install
          
      - name: Run performance benchmark
        run: node benchmark.js
        id: benchmark

      - name: Store benchmark results
        if: github.event_name == 'schedule'
        run: |
          $results = @{
            timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            sha = $env:GITHUB_SHA
            run_id = $env:GITHUB_RUN_ID
          } | ConvertTo-Json
          Write-Output $results

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      packages: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "tags=ghcr.io/${REPO_LOWER}:sha-${SHA_SHORT},ghcr.io/${REPO_LOWER}:latest" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}

  npm-publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Install dependencies
        run: npm install --ignore-scripts
        
      - name: Get package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"
        
      - name: Package
        run: npm pack
        
      - name: Publish to npm
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not configured, skipping npm publish. To enable publishing, add an NPM_TOKEN secret at https://github.com/ypeng1620-beep/AI-Agent-Guard/settings/secrets/actions"
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
