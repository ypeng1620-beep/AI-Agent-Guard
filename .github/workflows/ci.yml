name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 9 * * *'  # 每日9点运行性能测试

jobs:
  test:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          cd integrator
          npm install
          cd ../subprojects/01-eval-engine
          npm install
          
      - name: Run unit tests
        run: node tests/unit.test.js
        
      - name: Run security tests
        run: node tests/security.test.js
        
      - name: Run integration tests
        run: node tests/full-integration.test.js
        
  performance:
    runs-on: windows-latest
    needs: test
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          cd integrator
          npm install
          
      - name: Run performance benchmark
        run: |
          $output = node benchmark.js 2>&1
          echo "$output"
          Write-Output "## Performance Benchmark Results" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "```" >> $env:GITHUB_STEP_SUMMARY
          echo "$output" | Select-String -Pattern "约束检查|相似度计算|收敛检测|平均耗时|性能评级" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "```" >> $env:GITHUB_STEP_SUMMARY
        id: benchmark

      - name: Store benchmark results
        if: github.event_name == 'schedule'
        run: |
          $results = @{
            timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            sha = $env:GITHUB_SHA
            run_id = $env:GITHUB_RUN_ID
          } | ConvertTo-Json
          Write-Output $results
          # 可以在这里添加存储到 GitHub Secrets 或外部服务

  docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=sha-{{ sha }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,event=schedule
            type=raw,value=latest,enable={{is_default_branch}}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  npm-publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          scope: '@ai-agent-guard'
          
      - name: Get package version
        id: version
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        
      - name: Package
        run: npm pack
        
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
