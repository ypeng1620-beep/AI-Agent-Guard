<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent Guard - 实时监控</title>
  <style>
    :root {
      --bg-deep: #0F0F11;
      --bg-panel: #1A1A1F;
      --bg-card: #222228;
      --bg-hover: #2A2A32;
      
      --neon-cyan: #00CCFF;
      --neon-cyan-dim: #0099CC;
      --neon-cyan-glow: rgba(0, 204, 255, 0.3);
      --neon-cyan-subtle: rgba(0, 204, 255, 0.1);
      
      --status-green: #00FF88;
      --status-orange: #FF9500;
      --status-red: #FF3B30;
      --status-yellow: #FFD60A;
      
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A8;
      --text-muted: #606068;
      
      --border-color: #2A2A35;
      --border-glow: rgba(0, 204, 255, 0.4);
      
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', Consolas, 'Courier New', monospace;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-sans);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--neon-cyan), #00FF88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-panel);
      border-radius: 20px;
      border: 1px solid var(--border-color);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--status-green);
      box-shadow: 0 0 8px var(--status-green);
      animation: pulse 2s infinite;
    }
    
    .status-dot.warning { background: var(--status-orange); box-shadow: 0 0 8px var(--status-orange); }
    .status-dot.error { background: var(--status-red); box-shadow: 0 0 8px var(--status-red); }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }
    
    .card {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
    }
    
    .card:hover {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 20px var(--neon-cyan-glow);
    }
    
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color);
    }
    
    .metric:last-child { border-bottom: none; }
    
    .metric-label { color: var(--text-secondary); font-size: 14px; }
    
    .metric-value {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--neon-cyan);
    }
    
    .metric-value.success { color: var(--status-green); }
    .metric-value.warning { color: var(--status-orange); }
    .metric-value.danger { color: var(--status-red); }
    
    .progress-bar {
      height: 6px;
      background: var(--bg-card);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-cyan), var(--status-green));
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    
    .chart-container {
      height: 120px;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      padding-top: 20px;
    }
    
    .chart-bar {
      flex: 1;
      background: linear-gradient(to top, var(--neon-cyan), var(--neon-cyan-dim));
      border-radius: 2px 2px 0 0;
      min-height: 4px;
      transition: height 0.3s ease, background 0.3s ease;
    }
    
    .chart-bar:hover {
      background: var(--status-green);
    }
    
    .log-list {
      max-height: 280px;
      overflow-y: auto;
    }
    
    .log-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-color);
      font-family: var(--font-mono);
      font-size: 12px;
    }
    
    .log-time { color: var(--text-muted); white-space: nowrap; }
    
    .log-level {
      font-weight: 600;
      min-width: 60px;
    }
    
    .log-level.debug { color: var(--text-muted); }
    .log-level.info { color: var(--neon-cyan); }
    .log-level.warn { color: var(--status-orange); }
    .log-level.error { color: var(--status-red); }
    .log-level.critical { color: var(--status-yellow); }
    
    .log-message { color: var(--text-primary); word-break: break-all; }
    
    .alert-item {
      padding: 12px;
      background: var(--bg-card);
      border-radius: 8px;
      margin-bottom: 8px;
      border-left: 3px solid var(--status-red);
    }
    
    .alert-item.warning { border-left-color: var(--status-orange); }
    
    .alert-time { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .alert-message { font-size: 13px; }
    
    .btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .btn:hover {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 10px var(--neon-cyan-glow);
    }
    
    .full-width { grid-column: 1 / -1; }
    
    .redis-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-card);
      border-radius: 6px;
      font-size: 12px;
    }
    
    .redis-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--status-green);
    }
    
    .redis-dot.offline { background: var(--status-red); }
    
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛡️ AI Agent Guard - 实时监控</h1>
    <div style="display: flex; gap: 12px; align-items: center;">
      <div class="redis-status">
        <div class="redis-dot" id="redisDot"></div>
        <span id="redisStatus">Memory</span>
      </div>
      <div class="status-badge">
        <div class="status-dot" id="systemDot"></div>
        <span id="systemStatus">系统就绪</span>
      </div>
      <button class="btn" onclick="refreshData()">🔄 刷新</button>
    </div>
  </div>
  
  <div class="grid">
    <!-- 系统状态 -->
    <div class="card">
      <div class="card-title">📊 系统状态</div>
      <div class="metric">
        <span class="metric-label">评估引擎</span>
        <span class="metric-value success" id="evalStatus">运行中</span>
      </div>
      <div class="metric">
        <span class="metric-label">约束引擎</span>
        <span class="metric-value success" id="constraintStatus">正常</span>
      </div>
      <div class="metric">
        <span class="metric-label">收敛检测</span>
        <span class="metric-value success" id="convergenceStatus">监控中</span>
      </div>
      <div class="metric">
        <span class="metric-label">记忆模块</span>
        <span class="metric-value success" id="memoryStatus">就绪</span>
      </div>
      <div class="metric">
        <span class="metric-label">插件系统</span>
        <span class="metric-value" id="pluginStatus">未加载</span>
      </div>
    </div>
    
    <!-- 实时统计 -->
    <div class="card">
      <div class="card-title">📈 今日统计</div>
      <div class="metric">
        <span class="metric-label">评估次数</span>
        <span class="metric-value" id="evalCount">0</span>
      </div>
      <div class="metric">
        <span class="metric-label">通过</span>
        <span class="metric-value success" id="passCount">0</span>
      </div>
      <div class="metric">
        <span class="metric-label">拦截</span>
        <span class="metric-value danger" id="blockCount">0</span>
      </div>
      <div class="metric">
        <span class="metric-label">收敛触发</span>
        <span class="metric-value warning" id="convCount">0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="passRateBar" style="width: 0%"></div>
      </div>
      <div style="text-align: center; margin-top: 8px; color: var(--text-secondary);">
        通过率: <span id="passRate">0%</span>
      </div>
    </div>
    
    <!-- 性能指标 -->
    <div class="card">
      <div class="card-title">⚡ 性能指标</div>
      <div class="metric">
        <span class="metric-label">平均响应时间</span>
        <span class="metric-value" id="avgResponse">0ms</span>
      </div>
      <div class="metric">
        <span class="metric-label">相似度调用</span>
        <span class="metric-value" id="simCalls">0</span>
      </div>
      <div class="metric">
        <span class="metric-label">内存使用</span>
        <span class="metric-value" id="memory">0 MB</span>
      </div>
      <div class="metric">
        <span class="metric-label">在线时长</span>
        <span class="metric-value" id="uptime">0h</span>
      </div>
    </div>
    
    <!-- 评分分布 -->
    <div class="card">
      <div class="card-title">📉 评分分布</div>
      <div class="chart-container" id="scoreChart">
      </div>
      <div style="display: flex; justify-content: space-between; margin-top: 12px; font-size: 11px; color: var(--text-muted);">
        <span>0-20</span><span>20-40</span><span>40-60</span><span>60-80</span><span>80-100</span>
      </div>
    </div>
    
    <!-- 告警 -->
    <div class="card">
      <div class="card-title">🚨 实时告警 <span id="alertCount">(0)</span></div>
      <div id="alertList">
        <div class="alert-item warning">
          <div class="alert-time">暂无告警</div>
          <div class="alert-message">系统运行正常</div>
        </div>
      </div>
    </div>
    
    <!-- Redis状态 -->
    <div class="card">
      <div class="card-title">🗄️ 存储状态</div>
      <div class="metric">
        <span class="metric-label">存储后端</span>
        <span class="metric-value" id="storageBackend">Memory</span>
      </div>
      <div class="metric">
        <span class="metric-label">连接状态</span>
        <span class="metric-value success" id="storageStatus">Connected</span>
      </div>
      <div class="metric">
        <span class="metric-label">键数量</span>
        <span class="metric-value" id="keyCount">0</span>
      </div>
      <div class="metric">
        <span class="metric-label">内存占用</span>
        <span class="metric-value" id="memoryUsage">0 KB</span>
      </div>
    </div>
    
    <!-- 实时日志 -->
    <div class="card full-width">
      <div class="card-title">📋 实时日志</div>
      <div class="log-list" id="logList"></div>
    </div>
  </div>
  
  <script>
    // 统计数据
    let stats = {
      evalCount: 0,
      passCount: 0,
      blockCount: 0,
      convCount: 0,
      simCalls: 0,
      avgResponse: 0,
      startTime: Date.now(),
      alerts: []
    };
    
    const logMessages = [
      { level: 'info', msg: '系统启动完成' },
      { level: 'debug', msg: '配置加载: general v2.0' },
      { level: 'info', msg: '相似度计算: 92.5%' },
      { level: 'warn', msg: '收敛检测: 分数波动 2.3%' },
      { level: 'info', msg: '约束检查通过' },
      { level: 'debug', msg: '评估分数: 85' },
      { level: 'info', msg: '记忆保存成功' }
    ];
    
    function addLog(level, message) {
      const logList = document.getElementById('logList');
      const now = new Date();
      const time = now.toTimeString().slice(0, 8);
      
      const entry = document.createElement('div');
      entry.className = 'log-item';
      entry.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-level ${level}">${level.toUpperCase()}</span>
        <span class="log-message">${message}</span>
      `;
      
      logList.insertBefore(entry, logList.firstChild);
      
      while (logList.children.length > 100) {
        logList.removeChild(logList.lastChild);
      }
    }
    
    function addAlert(message, type = 'info') {
      const alertList = document.getElementById('alertList');
      const now = new Date();
      const time = now.toTimeString().slice(0, 8);
      
      stats.alerts.unshift({ time, message, type });
      if (stats.alerts.length > 10) stats.alerts.pop();
      
      document.getElementById('alertCount').textContent = `(${stats.alerts.length})`;
      
      if (stats.alerts.length === 1) {
        alertList.innerHTML = '';
      }
      
      const entry = document.createElement('div');
      entry.className = `alert-item ${type === 'warning' ? 'warning' : ''}`;
      entry.innerHTML = `
        <div class="alert-time">${time}</div>
        <div class="alert-message">${message}</div>
      `;
      
      alertList.insertBefore(entry, alertList.firstChild);
      
      while (alertList.children.length > 10) {
        alertList.removeChild(alertList.lastChild);
      }
    }
    
    function updateStats() {
      document.getElementById('evalCount').textContent = stats.evalCount;
      document.getElementById('passCount').textContent = stats.passCount;
      document.getElementById('blockCount').textContent = stats.blockCount;
      document.getElementById('convCount').textContent = stats.convCount;
      document.getElementById('simCalls').textContent = stats.simCalls;
      
      const passRate = stats.evalCount > 0 ? ((stats.passCount / stats.evalCount) * 100).toFixed(1) : 0;
      document.getElementById('passRate').textContent = passRate + '%';
      document.getElementById('passRateBar').style.width = passRate + '%';
      
      // 更新响应时间
      document.getElementById('avgResponse').textContent = stats.avgResponse.toFixed(0) + 'ms';
      
      // 更新内存
      if (performance.memory) {
        const used = (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(1);
        document.getElementById('memory').textContent = used + ' MB';
      }
      
      // 更新在线时长
      const uptime = Date.now() - stats.startTime;
      const hours = Math.floor(uptime / 3600000);
      const minutes = Math.floor((uptime % 3600000) / 60000);
      document.getElementById('uptime').textContent = `${hours}h ${minutes}m`;
      
      // 更新评分分布
      updateScoreChart();
    }
    
    function updateScoreChart() {
      const chart = document.getElementById('scoreChart');
      const heights = Array.from({ length: 10 }, () => Math.random() * 60 + 20);
      chart.innerHTML = heights.map(h => `<div class="chart-bar" style="height: ${h}%"></div>`).join('');
    }
    
    async function fetchStatus() {
      try {
        const res = await fetch('http://localhost:18791/status');
        if (res.ok) {
          const data = await res.json();
          
          if (data.data?.memory) {
            document.getElementById('memoryStatus').textContent = '正常';
            document.getElementById('memoryStatus').className = 'metric-value success';
          }
          
          addLog('info', '状态同步成功');
        }
      } catch (e) {
        document.getElementById('systemStatus').textContent = '离线';
        document.getElementById('systemDot').className = 'status-dot warning';
      }
    }
    
    function refreshData() {
      // 模拟数据更新
      stats.evalCount += Math.floor(Math.random() * 5 + 1);
      stats.passCount += Math.floor(Math.random() * 4 + 1);
      stats.blockCount += Math.floor(Math.random() * 2);
      if (Math.random() > 0.9) stats.convCount++;
      stats.simCalls += Math.floor(Math.random() * 10 + 5);
      stats.avgResponse = Math.random() * 50 + 10;
      
      updateStats();
      addLog('debug', `刷新: 评估+${stats.evalCount}`);
      
      // 随机告警
      if (Math.random() > 0.95) {
        addAlert('评估分数偏低: ' + (Math.random() * 20 + 60).toFixed(0), 'warning');
      }
    }
    
    // 初始化
    updateScoreChart();
    updateStats();
    fetchStatus();
    
    // 定时更新
    setInterval(() => {
      refreshData();
      addLog('debug', '定时同步');
    }, 3000);
    
    // 每10秒添加一条日志
    setInterval(() => {
      const log = logMessages[Math.floor(Math.random() * logMessages.length)];
      addLog(log.level, log.msg);
    }, 10000);
  </script>
</body>
</html>
